[PRIMER_SETTINGS]
# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================
PRIMER_TASK = generic
PRIMER_PICK_LEFT_PRIMER = 1
PRIMER_PICK_INTERNAL_OLIGO = 0
PRIMER_PICK_RIGHT_PRIMER = 1

# ==============================================================================
# LENGTH CONSTRAINTS
# ==============================================================================
# Target length: 20-24 bases
PRIMER_OPT_SIZE = 22
PRIMER_MIN_SIZE = 20
PRIMER_MAX_SIZE = 24

# ==============================================================================
# MELTING TEMPERATURE (Tm)
# ==============================================================================
# Target Tm: 50-60°C
PRIMER_OPT_TM = 55.0
PRIMER_MIN_TM = 50.0
PRIMER_MAX_TM = 60.0
# Max Tm difference between pair: 5°C
PRIMER_MAX_DIFF_TM = 5.0

# ==============================================================================
# GC CONTENT & CLAMPS
# ==============================================================================
# Target GC: 40-60%
PRIMER_MIN_GC = 40.0
PRIMER_MAX_GC = 60.0
PRIMER_OPT_GC = 50.0

# 3' End Clamp: Enforce at least 1 G or C at the 3' end
PRIMER_GC_CLAMP = 1

# 5' End Clamp: Enforce G or C at 5' end using sequence matching
# 'S' = Strong interaction (G or C)
PRIMER_MUST_MATCH_FIVE_PRIME = S

# ==============================================================================
# COMPLEMENTARITY (RIGOROUS)
# ==============================================================================
# Scores correspond roughly to base pairs.
# 4 = max 4 bp self-binding (very strict)
PRIMER_MAX_SELF_ANY = 4
# 2 = max 2 bp binding at 3' end (very strict)
PRIMER_MAX_SELF_END = 2
# Pair constraints (Cross-dimers)
PRIMER_PAIR_MAX_COMPL_ANY = 4
PRIMER_PAIR_MAX_COMPL_END = 2

# ==============================================================================
# MISC & PRODUCT SIZE
# ==============================================================================
# Limit homopolymer runs (e.g. GGGG)
PRIMER_MAX_POLY_X = 4
PRIMER_SALT_MONOVALENT = 50.0
PRIMER_DNA_CONC = 50.0
PRIMER_MAX_NS_ACCEPTED = 0

# Range defined as a list of lists for primer3-py
PRIMER_PRODUCT_SIZE_RANGE = [120, 200]
